<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* Selectors */
      /* 
        1) Element Selector
        2) Class Selector 
        3) Id selector 
        4) attribute selector 
        5) Universal Selector 
        6) Combinators  
        */
      /* Element Selector  */
      h2 {
        color: red;
      }

      p {
        font-size: 10px;
      }
      /* Class Selector */
      .headings {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
      }

      .bgBlue {
        background-color: lightblue;
      }
      /* Design Token */

      .primaryBg {
        background-color: yellow;
      }
      .secondBg {
        background-color: black;
      }
      .primaryText {
        color: black;
      }
      .secondaryText {
        color: white;
      }
    </style>
  </head>
  <body>
    <!-- inline CSS  -->
    <!-- Internal CSS -->
    <!-- External CSS -->

    <!-- Inline CSS -->
    <h1 style="background-color: lightgreen; color: red">I am heading tag</h1>
    <p style="font-family: cursive">I am p tag</p>

    <!-- Internal CSS  -->

    <h2 class="primaryBg primaryText">I am heading2 tag</h2>
    <h2>I am heading2.1 tag</h2>
    <p class="secondBg secondaryText">I am p2tag</p>
  </body>
</html>
